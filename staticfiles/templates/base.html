<!doctype html>
{% load static %}
{% load pwa %}
<html lang="en">
  <head>
    {% progressive_web_app_meta %}
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>Hangarin | Task Manager</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
    <style>
      @import url('https://rsms.me/inter/inter.css');
      :root { --tblr-font-sans-serif: 'Inter var', sans-serif; }
      body { font-feature-settings: "cv03", "cv04", "cv11"; }
      .navbar-brand span { font-size: 1.5rem; letter-spacing: -0.02rem; }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="navbar navbar-expand-md navbar-light d-print-none">
        <div class="container-xl">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
            <span class="navbar-toggler-icon"></span>
          </button>

          <h1 class="navbar-brand pe-md-3">
            <a href="/" class="text-decoration-none">
              <span class="text-primary fw-bold">Hangarin</span>
            </a>
          </h1>

          <div class="collapse navbar-collapse" id="navbar-menu">
            <div class="navbar-nav">
              <a class="nav-link" href="/">
                <span class="nav-link-title">Dashboard</span>
              </a>
            </div>
          </div>

          <div class="navbar-nav flex-row order-md-last">
            <a href="{% url 'admin:index' %}" class="btn btn-outline-primary btn-sm">Admin Panel</a>
          </div>
        </div>
      </header>
      
      <div class="page-wrapper">
        <div class="page-body">
          <div class="container-xl">
            {% block content %}{% endblock %}
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js" defer></script>
  </body>
</html>
