<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>Hangarin | Task & To-Do Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">
    <style>
      @import url('https://rsms.me/inter/inter.css');
      :root { --tblr-font-sans-serif: 'Inter var', -apple-system, BlinkMacSystemFont, San Francisco, Segoe UI, Roboto, Helvetica Neue, sans-serif; }
      body { font-feature-settings: "cv03", "cv04", "cv11"; }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="navbar navbar-expand-md navbar-light d-print-none">
        <div class="container-xl">
          <h1 class="navbar-brand navbar-brand-autodark pe-0 pe-md-3">
            <a href="/">Hangarin</a>
          </h1>
          <div class="navbar-nav flex-row order-md-last">
            <div class="nav-item">
              <a href="/admin" class="btn btn-outline-primary btn-sm">Admin Panel</a>
            </div>
          </div>
        </div>
      </header>
      
      <div class="page-wrapper">
        <div class="page-body">
          <div class="container-xl">
            {% block content %}
            {% endblock %}
          </div>
        </div>
        <footer class="footer footer-transparent d-print-none">
          <div class="container-xl text-center">
            <p class="text-muted small">Hangarin Task Manager &copy; 2026</p>
          </div>
        </footer>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js" defer></script>
  </body>
</html>
